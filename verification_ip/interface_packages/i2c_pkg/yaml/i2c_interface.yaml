uvmf:
  interfaces:
    i2c:
      clock: scl
      config_constraints: []
      config_vars: []
      existing_library_component: 'True'
      gen_inbound_streaming_driver: 'False'
      hdl_pkg_parameters: []
      hdl_typedefs:
      - name: i2c_op_t
        type: enum { I2C_WR, I2C_RD }
      hvl_pkg_parameters: []
      hvl_typedefs: []
      parameters:
      - name: I2C_ADDR_WIDTH
        type: int
        value: '7'
      - name: I2C_DATA_WIDTH
        type: int
        value: '8'
      - name: I2C_SLAVE_ADDRESS
        type: int
        value: 8'h22
      ports:
      - dir: inout
        name: sda
        reset_value: '''b0'
        width: '1'
      reset: reset_n
      reset_assertion_level: 'False'
      transaction_constraints: []
      transaction_vars:
      - comment: ''
        iscompare: 'True'
        isrand: 'True'
        name: addr
        type: bit [I2C_ADDR_WIDTH-1:0]
        unpacked_dimension: ''
      - comment: ''
        iscompare: 'True'
        isrand: 'True'
        name: data
        type: bit [I2C_DATA_WIDTH-1:0]
        unpacked_dimension: '[]'
      - comment: ''
        iscompare: 'True'
        isrand: 'True'
        name: op
        type: i2c_op_t
        unpacked_dimension: ''
      use_dpi_link: 'False'
      veloce_ready: 'False'
