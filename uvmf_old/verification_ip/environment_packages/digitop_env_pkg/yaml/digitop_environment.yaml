uvmf:
  environments:
    digitop:
      agents:
      - initiator_responder: RESPONDER
        name: i2c_a
        parameters:
        - name: I2C_ADDR_WIDTH
          value: '7'
        - name: I2C_DATA_WIDTH
          value: '8'
        - name: I2C_SLAVE_ADDRESS
          value: 8'h22
        type: i2c
      analysis_components:
      - name: digicore_pred
        parameters: []
        type: digicore_predictor
      analysis_exports: []
      analysis_ports: []
      config_constraints: []
      config_vars: []
      existing_library_component: 'True'
      hvl_pkg_parameters: []
      non_uvmf_components: []
      parameters: []
      qvip_memory_agents: []
      scoreboards:
      - name: digicore_scoreboard
        sb_type: uvmf_in_order_scoreboard
        trans_type: i2c_transaction
      subenvs: []
      tlm_connections:
      - driver: i2c_a.monitored_ap
        receiver: digicore_pred.i2c_in_ae
        validate: 'True'
      - driver: digicore_pred.i2c_expected_ap
        receiver: digicore_scoreboard.expected_analysis_export
        validate: 'True'
      - driver: i2c_a.monitored_ap
        receiver: digicore_scoreboard.actual_analysis_export
        validate: 'True'
